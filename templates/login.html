{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'uz' }}" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% trans "Kirish" %} — Kafedra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Playfair Display"', 'Georgia', 'serif'],
            sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', system-ui, sans-serif; }
    h1, h2 { font-family: 'Playfair Display', Georgia, serif; }

    .login-bg {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
    }
    .mesh {
      background-image:
        radial-gradient(at 40% 20%, rgba(129,140,248,0.15) 0px, transparent 50%),
        radial-gradient(at 80% 0%, rgba(167,139,250,0.1) 0px, transparent 50%),
        radial-gradient(at 0% 50%, rgba(99,102,241,0.12) 0px, transparent 50%);
    }
    input:focus { outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
  </style>
</head>
<body class="h-full login-bg mesh">

<div class="min-h-screen flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-sm animate__animated animate__fadeInUp">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-2xl bg-white/15 backdrop-blur-sm flex items-center justify-center mx-auto mb-4 border border-white/20">
        <svg class="w-7 h-7 text-primary-200" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color:#a5b4fc">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
        </svg>
      </div>
      <h1 class="text-2xl font-display font-semibold text-white leading-tight">Kafedra</h1>
      <p class="text-indigo-300 text-sm mt-1">{% trans "Hujjat Boshqaruv Tizimi" %}</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
      <div class="h-1 bg-gradient-to-r from-indigo-500 via-violet-500 to-indigo-400"></div>
      <div class="p-7">
        <h2 class="text-lg font-display font-semibold text-slate-800 mb-5">{% trans "Tizimga kirish" %}</h2>

        {% if form.errors %}
        <div class="flex items-center gap-2 bg-rose-50 border border-rose-200 rounded-xl px-4 py-3 mb-5 text-sm text-rose-700">
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          {% trans "Login yoki parol noto'g'ri." %}
        </div>
        {% endif %}

        <form method="post" class="space-y-4" novalidate>
          {% csrf_token %}

          <div>
            <label for="id_username" class="block text-sm font-medium text-slate-700 mb-1.5">
              {% trans "Foydalanuvchi nomi" %}
            </label>
            <input type="text" name="username" id="id_username" autocomplete="username" required
                   class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm text-slate-800 placeholder-slate-400 transition bg-slate-50 focus:bg-white"
                   placeholder="username" />
          </div>

          <div>
            <label for="id_password" class="block text-sm font-medium text-slate-700 mb-1.5">
              {% trans "Parol" %}
            </label>
            <input type="password" name="password" id="id_password" autocomplete="current-password" required
                   class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm text-slate-800 placeholder-slate-400 transition bg-slate-50 focus:bg-white"
                   placeholder="••••••••" />
          </div>

          <input type="hidden" name="next" value="{{ next }}" />

          <button type="submit"
                  class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl
                         transition-all duration-200 shadow-sm hover:shadow-md text-sm mt-1">
            {% trans "Kirish" %} →
          </button>
        </form>
      </div>
    </div>

    <p class="text-center text-indigo-400/60 text-xs mt-6">
      Kafedra Hújjetlerin Elektron Basqarıw Sisteması · {{ 2025 }}
    </p>
  </div>
</div>

</body>
</html>
